<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Walrus Memory World Cup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <h1>🐘 Walrus Memory World Cup</h1>

    <button onclick="connectWallet()">Connect Sui Wallet</button>

    <div id="walletStatus">Not connected</div>
  </div>

  <div class="container">

    <div class="panel">
      <h3>🐘 Mascot</h3>
      <div id="mascot">Waiting...</div>
    </div>

    <div class="panel">
      <h3>Predict</h3>

      <input id="input" placeholder="World Cup winner..." />
      <button onclick="send()">Send</button>

      <div id="chat"></div>
    </div>

    <div class="panel">
      <h3>Memory</h3>
      <div id="memory"></div>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
