<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sui Wallet Demo</title>
  <link rel="stylesheet" href="style.css">

  <!-- Sui dApp Kit -->
  <script src="https://unpkg.com/@mysten/dapp-kit@latest/dist/index.global.js"></script>
</head>

<body>

  <div class="topbar">
    <h2>🐘 Walrus Memory World Cup</h2>

    <button id="connectBtn">Connect Sui Wallet</button>

    <div id="walletStatus">Not connected</div>
  </div>

  <div class="container">

    <div class="panel">
      <h3>Mascot</h3>
      <div id="mascot">Waiting...</div>
    </div>

    <div class="panel">
      <h3>Predict</h3>

      <input id="input" placeholder="World Cup winner..." />
      <button id="sendBtn">Send</button>

      <div id="memory"></div>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
