<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Walrus Memory World Cup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <h1>🐘 Walrus Memory World Cup</h1>

    <button onclick="connectWallet()">Connect Sui Wallet</button>

    <div id="wallet"></div>
  </div>

  <div class="container">

    <div class="mascot">
      <img src="images/walrus.png" />
      <div id="mascotText">🐘 Waiting for your prediction...</div>
    </div>

    <div class="chat">
      <div id="chatBox"></div>

      <input id="input" placeholder="Predict World Cup winner..." />
      <button onclick="send()">Send</button>
    </div>

    <div class="memory">
      <h3>Memory Timeline</h3>
      <div id="memoryBox"></div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="wallet.js"></script>
  <script src="memwal.js"></script>
  <script src="walrus.js"></script>
  <script src="mascot.js"></script>
  <script src="app.js"></script>

</body>
</html>
